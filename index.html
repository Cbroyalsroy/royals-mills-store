<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royals Mills Store</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Baloo 2',sans-serif;background:linear-gradient(160deg,#0D0D2B,#1A237E);min-height:100vh;display:flex;align-items:center;justify-content:center;color:white}
.box{text-align:center;padding:40px 24px;max-width:400px;width:95vw}
.icon{font-size:80px;margin-bottom:16px}
h1{font-size:28px;font-weight:800;color:#FFB300;margin-bottom:8px}
p{color:rgba(255,255,255,0.5);font-size:14px;margin-bottom:36px}
.btn{display:block;width:100%;padding:16px;border-radius:16px;font-size:17px;font-weight:800;font-family:'Baloo 2',sans-serif;text-decoration:none;margin-bottom:14px;transition:transform 0.1s}
.btn:active{transform:scale(0.98)}
.btn.app{background:linear-gradient(135deg,#FFB300,#FF8F00);color:#1A0A00}
.btn.admin{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:white}
.footer{margin-top:24px;font-size:12px;color:rgba(255,255,255,0.3)}
</style>
</head>
<body>
<div class="box">
  <div class="icon">👑</div>
  <h1>Royals Mills Store</h1>
  <p>आपकी चक्की का डिजिटल हिसाब — Real-time & Secure</p>
  <a class="btn app" href="royals_mills_app.html">🚀 Mill Owner App खोलें</a>
  <a class="btn admin" href="royals_mills_admin.html">👑 Admin Panel</a>
  <div class="footer">Powered by Firebase • Real-time Data</div>
</div>
</body>
</html>
