<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GGC Mills - Entries</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
    .tabs { display: flex; gap: 8px; padding: 16px; background: #f5f5f5; }
    .tab { padding: 10px 14px; cursor: pointer; border: 1px solid #ddd; border-bottom: none; background: #fff; }
    .tab.active { background: #eaeaff; font-weight: bold; }
    .panel { padding: 16px; border: 1px solid #ddd; background: #fff; }
    .hidden { display: none; }
    form div { margin-bottom: 10px; }
    label { display: block; margin-bottom: 4px; }
    input, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
  </style>
</head>
<body>

  <div class="tabs" role="tablist" aria-label="Entry sections">
    <button class="tab active" data-tab="new-entry" aria-selected="true" role="tab">📦 नई एंट्री</button>
    <button class="tab" data-tab="entry-list" aria-selected="false" role="tab">📋 एंट्री लिस्ट</button>
  </div>

  <section id="new-entry" class="panel" role="tabpanel" aria-label="नई एंट्री फॉर्म">
    <h2>नई एंट्री</h2>
    <form id="entryForm">
      <div>
        <label>ग्राहक नाम</label>
        <input type="text" id="name" required />
      </div>
      <div>
        <label>संपर्क नंबर</label>
        <input type="tel" id="phone" required />
      </div>
      <div>
        <label>ईमेल</label>
        <input type="email" id="email" />
      </div>
      <div>
        <label>प्रोडक्ट/डिलीवरी विवरण</label>
        <input type="text" id="details" required />
      </div>
      <div>
        <label>मात्रा</label>
        <input type="number" id="quantity" required min="1" />
      </div>
      <div>
        <label>मूल्य</label>
        <input type="number" id="price" required min="0" step="0.01" />
      </div>
      <div>
        <label>नोट्स</label>
        <textarea id="notes"></textarea>
      </div>
      <button type="submit">संचय करें</button>
      <button type="button" id="resetBtn">रीसेट</button>
    </form>
  </section>

  <section id="entry-list" class="panel hidden" role="tabpanel" aria-label="एंट्री लिस्ट">
    <h2>एंट्री लिस्ट</h2>
    <input type="search" id="search" placeholder="खोजें: नाम, फोन, ईमेल आदि" />
    <table aria-label="Customer entries">
      <thead>
        <tr>
          <th>क्रमांक</th>
          <th>नाम</th>
          <th>फोन</th>
          <th>ईमेल</th>
          <th>विवरण</th>
          <th>मात्रा</th>
          <th>मूल्य</th>
          <th>तिथि</th>
          <th>क्रियाएं</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <!-- entries render here -->
      </tbody>
    </table>
  </section>

  <script>
    const tabs = document.querySelectorAll('.tab');
    const panels = {
      'new-entry': document.getElementById('new-entry'),
      'entry-list': document.getElementById('entry-list')
    };

    // Simple in-browser storage
    let entries = JSON.parse(localStorage.getItem('entries') || '[]');

    function renderList() {
      const search = document.getElementById('search').value.toLowerCase();
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';
      const filtered = entries.filter(e =>
        [e.name, e.phone, e.email, e.details].some(v => v && v.toString().toLowerCase().includes(search))
      );
      filtered.forEach((e, idx) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${idx + 1}</td>
          <td>${e.name}</td>
          <td>${e.phone}</td>
          <td>${e.email || ''}</td>
          <td>${e.details}</td>
          <td>${e.quantity}</td>
          <td>${e.price}</td>
          <td>${new Date(e.date).toLocaleDateString()}</td>
          <td>
            <button data-action="view" data-i="${idx}">View</button>
            <button data-action="delete" data-i="${idx}">Delete</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    // Tab switching
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        Object.entries(panels).forEach(([id, el]) => el.classList.toggle('hidden', id !== tab.dataset.tab));
        // adjust aria
        tabs.forEach(t => t.setAttribute('aria-selected', t === tab).dataset.tab);
      });
    });

    // Initialize: show new-entry, hide entry-list
    panels['new-entry'].classList.remove('hidden');
    panels['entry-list'].classList.add('hidden');

    // Form submission
    document.getElementById('entryForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const entry = {
        name: document.getElementById('name').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        email: document.getElementById('email').value.trim(),
        details: document.getElementById('details').value.trim(),
        quantity: Number(document.getElementById('quantity').value),
        price: Number(document.getElementById('price').value),
        notes: document.getElementById('notes').value.trim(),
        date: new Date().toISOString()
      };
      if (!entry.name || !entry.phone || !entry.details || !entry.quantity || !entry.price) {
        alert('कृपया सभी आवश्यक फ़ील्ड भरें.');
        return;
      }
      entries.push(entry);
      localStorage.setItem('entries', JSON.stringify(entries));
      document.getElementById('entryForm').reset();
      renderList();
      // optional: switch to list tab automatically
      document.querySelector('button[data-tab="entry-list"]').click();
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      document.getElementById('entryForm').reset();
    });

    // Search live
    document.getElementById('search').addEventListener('input', renderList);

    // Delegated actions in list
    document.getElementById('tableBody').addEventListener('click', (ev) => {
      const btn = ev.target.closest('button');
      if (!btn) return;
      const idx = Number(btn.dataset.i);
      if (btn.dataset.action === 'delete') {
        entries.splice(idx, 1);
        localStorage.setItem('entries', JSON.stringify(entries));
        renderList();
      } else if (btn.dataset.action === 'view') {
        alert(JSON.stringify(entries[idx], null, 2));
      }
    });

    // Optional: ensure list shows on first load if entries exist
    renderList();
  </script>
</body>
</html>
