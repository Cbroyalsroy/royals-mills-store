<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Baloo 2',sans-serif;min-height:100vh}

/* ══ NEW LOGIN SCREEN ══ */
#loginScreen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#FFF8F0 0%,#FFF3E0 50%,#FFE0B2 100%);
  padding:20px;position:relative;overflow:hidden;
}
#loginScreen::before{
  content:'';position:absolute;top:-100px;right:-80px;
  width:300px;height:300px;
  background:radial-gradient(circle,rgba(230,81,0,0.12),transparent 70%);
  border-radius:50%;pointer-events:none;
}
#loginScreen::after{
  content:'';position:absolute;bottom:-80px;left:-60px;
  width:240px;height:240px;
  background:radial-gradient(circle,rgba(230,81,0,0.08),transparent 70%);
  border-radius:50%;pointer-events:none;
}
.lbox{
  background:white;border-radius:28px;
  padding:30px 24px 28px;
  width:100%;max-width:380px;
  text-align:center;
  box-shadow:0 8px 40px rgba(230,81,0,0.15);
  position:relative;z-index:1;
}

/* Gear icon */
.login-gear{
  width:72px;height:72px;
  background:linear-gradient(135deg,#f0f0f0,#e0e0e0);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 12px;
  box-shadow:0 4px 16px rgba(0,0,0,0.12);
  font-size:38px;position:relative;
}
.login-gear::after{
  content:'';position:absolute;inset:-3px;border-radius:50%;
  border:3px solid rgba(230,81,0,0.25);
  animation:spin 8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

.login-title{font-size:26px;font-weight:800;color:#1a1a1a;margin-bottom:20px;letter-spacing:-0.5px;}

/* Tab switcher */
.login-tabs{
  display:flex;background:#f5f5f5;
  border-radius:14px;padding:4px;margin-bottom:20px;
}
.ltab{
  flex:1;padding:10px;border:none;background:transparent;
  font-family:'Baloo 2',sans-serif;font-size:14px;font-weight:800;
  color:#888;border-radius:10px;cursor:pointer;transition:all 0.2s;
}
.ltab.active{background:white;color:#E65100;box-shadow:0 2px 8px rgba(0,0,0,0.10);}

/* Fields */
.lfield{margin-bottom:14px;text-align:left;}
.lfield label{display:block;font-size:11px;font-weight:800;color:#666;margin-bottom:5px;letter-spacing:0.3px;}
.field-wrap{display:flex;border:1.5px solid #E0E0E0;border-radius:12px;overflow:hidden;transition:border-color 0.2s;}
.field-wrap:focus-within{border-color:#E65100;}
.field-pre{padding:12px 13px;background:#FAF5F0;font-size:13px;font-weight:700;color:#888;border-right:1.5px solid #E0E0E0;white-space:nowrap;display:flex;align-items:center;}
.field-wrap input{flex:1;padding:12px 13px;border:none;font-size:14px;font-family:'Baloo 2',sans-serif;font-weight:700;outline:none;color:#222;background:transparent;}
.field-wrap input::placeholder{color:#bbb;font-weight:600;}
.full-input{width:100%;padding:12px 13px;border:1.5px solid #E0E0E0;border-radius:12px;font-size:14px;font-family:'Baloo 2',sans-serif;font-weight:700;outline:none;color:#222;transition:border-color 0.2s;}
.full-input:focus{border-color:#E65100;}
.full-input::placeholder{color:#bbb;font-weight:600;}
.pin-input{width:100%;padding:13px;border:1.5px solid #E0E0E0;border-radius:12px;font-size:24px;font-weight:800;text-align:center;letter-spacing:8px;font-family:'Baloo 2',sans-serif;outline:none;color:#1A237E;transition:border-color 0.2s;}
.pin-input:focus{border-color:#E65100;}

/* Buttons */
.btn-primary{
  width:100%;padding:14px;
  background:linear-gradient(135deg,#E65100,#FF6D00);
  color:white;border:none;border-radius:14px;
  font-size:16px;font-weight:800;
  font-family:'Baloo 2',sans-serif;cursor:pointer;
  box-shadow:0 4px 16px rgba(230,81,0,0.35);
  transition:all 0.2s;margin-top:6px;letter-spacing:0.5px;
}
.btn-primary:active{transform:scale(0.98);}

/* Error */
.lerr{
  color:#C62828;font-size:12px;font-weight:700;
  background:#FFEBEE;border-radius:8px;padding:7px 12px;
  margin-top:8px;display:none;text-align:left;
}
.lerr.show{display:block;}

/* Staff info */
.staff-info{background:linear-gradient(135deg,#FFF8E1,#FFF3E0);border:1.5px solid #FFE082;border-radius:12px;padding:12px 14px;margin-top:14px;text-align:left;}
.staff-info .si-title{font-size:12px;font-weight:800;color:#E65100;margin-bottom:4px;}
.staff-info .si-body{font-size:11px;color:#666;line-height:1.7;}

/* Tabs content */
.tab-content{display:none;}
.tab-content.active{display:block;}

/* Step 3 */
.step3{display:none;}
.step3.show{display:block;}
.back-link{color:#aaa;font-size:12px;cursor:pointer;margin-top:10px;display:inline-block;}
.inp-s{width:100%;padding:10px 12px;border:1.5px solid #E0E0E0;border-radius:10px;font-size:13px;font-family:'Baloo 2',sans-serif;outline:none;margin-bottom:10px;}
.inp-s:focus{border-color:#E65100;}
.lbl-s{font-size:10px;font-weight:800;color:#888;display:block;margin-bottom:3px;}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="lbox">

    <!-- ── STEP 1 & 2: Main Login/Register ── -->
    <div id="mainStep">
      <div class="login-gear">⚙️</div>
      <div class="login-title">मिल मैनेजर</div>

      <!-- Tab Switcher -->
      <div class="login-tabs">
        <button class="ltab active" onclick="switchTab('login',this)">लॉगिन</button>
        <button class="ltab" onclick="switchTab('register',this)">रजिस्टर</button>
      </div>

      <!-- LOGIN -->
      <div id="loginTab" class="tab-content active">
        <div class="lfield">
          <label>फोन नंबर * (10 अंक)</label>
          <div class="field-wrap">
            <div class="field-pre">🇮🇳 +91</div>
            <input type="tel" id="loginMobile" placeholder="9876543210" maxlength="10" inputmode="numeric">
          </div>
        </div>
        <div class="lfield">
          <label>PIN * (4 अंक)</label>
          <input type="password" id="loginPin" class="pin-input" placeholder="• • • •" maxlength="4" inputmode="numeric">
        </div>
        <div class="lerr" id="lerr1"></div>
        <button class="btn-primary" onclick="doLogin()">🔐 लॉगिन करें</button>

        <div class="staff-info">
          <div class="si-title">👨‍👩‍👦 स्टाफ लॉगिन</div>
          <div class="si-body">कोई भी स्टाफ अपने मोबाइल पर<br><b>मिल नंबर + पिन</b> डालकर लॉगिन करें।<br>सभी का डेटा एक जगह दिखेगा। ✅</div>
        </div>
      </div>

      <!-- REGISTER -->
      <div id="registerTab" class="tab-content">
        <div class="lfield">
          <label>नाम *</label>
          <input type="text" id="regName2" class="full-input" placeholder="अपना नाम लिखें">
        </div>
        <div class="lfield">
          <label>फोन नंबर * (10 अंक)</label>
          <div class="field-wrap">
            <div class="field-pre">🇮🇳 +91</div>
            <input type="tel" id="regMobile" placeholder="9876543210" maxlength="10" inputmode="numeric">
          </div>
        </div>
        <div class="lfield">
          <label>गाँव/शहर *</label>
          <input type="text" id="regVillage" class="full-input" placeholder="अपना गाँव/शहर लिखें">
        </div>
        <div class="lfield">
          <label>Email *</label>
          <input type="email" id="regEmail" class="full-input" placeholder="your@email.com">
        </div>
        <div class="lfield">
          <label>PIN * (4 अंक)</label>
          <input type="password" id="regPin" class="pin-input" placeholder="• • • •" maxlength="4" inputmode="numeric">
        </div>
        <div class="lerr" id="lerr2"></div>
        <button class="btn-primary" onclick="doRegister()">✅ रजिस्टर करें</button>
      </div>
    </div>

    <!-- ── STEP 3: Mill Details ── -->
    <div id="step3" class="step3">
      <div class="login-gear">🏭</div>
      <div class="login-title" style="font-size:20px;margin-bottom:16px">मिल की जानकारी</div>
      <div class="lfield">
        <label class="lbl-s">👤 मालिक का नाम</label>
        <input type="text" id="regNameFinal" class="full-input" placeholder="राम कुमार">
      </div>
      <div class="lfield">
        <label class="lbl-s">🏭 मिल का नाम</label>
        <input type="text" id="regMill" class="full-input" placeholder="GGC Mills">
      </div>
      <div class="lfield">
        <label class="lbl-s">📍 राज्य</label>
        <select id="regState" class="full-input">
          <option value="">राज्य चुनें</option>
          <option>Uttar Pradesh</option><option>Bihar</option><option>Madhya Pradesh</option>
          <option>Rajasthan</option><option>Maharashtra</option><option>Punjab</option>
          <option>Haryana</option><option>Jharkhand</option><option>Gujarat</option><option>अन्य</option>
        </select>
      </div>
      <div class="lerr" id="lerr3"></div>
      <button class="btn-primary" onclick="alert('Step 3 complete!')">🚀 शुरू करें →</button>
      <div><span class="back-link" onclick="goBack()">← वापस जाएं</span></div>
    </div>

  </div>
</div>

<script>
function switchTab(tab, btn){
  document.querySelectorAll('.ltab').forEach(function(b){b.classList.remove('active');});
  document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active');});
  btn.classList.add('active');
  document.getElementById(tab+'Tab').classList.add('active');
}
function showErr(id, msg){
  var el=document.getElementById(id);
  el.textContent=msg; el.classList.add('show');
}
function hideErr(id){document.getElementById(id).classList.remove('show');}
function doLogin(){
  var mob=document.getElementById('loginMobile').value.trim();
  var pin=document.getElementById('loginPin').value.trim();
  hideErr('lerr1');
  if(mob.length!==10){showErr('lerr1','❌ 10 अंकों का मोबाइल नंबर डालें!');return;}
  if(pin.length!==4){showErr('lerr1','❌ 4 अंक का पिन डालें!');return;}
  alert('✅ Login होगा — Firebase यहाँ connect होगा!');
}
function doRegister(){
  var name=document.getElementById('regName2').value.trim();
  var mob=document.getElementById('regMobile').value.trim();
  var vil=document.getElementById('regVillage').value.trim();
  var email=document.getElementById('regEmail').value.trim();
  var pin=document.getElementById('regPin').value.trim();
  hideErr('lerr2');
  if(!name){showErr('lerr2','❌ नाम डालें!');return;}
  if(mob.length!==10){showErr('lerr2','❌ 10 अंकों का मोबाइल!');return;}
  if(!vil){showErr('lerr2','❌ गाँव/शहर डालें!');return;}
  if(!email||email.indexOf('@')<0){showErr('lerr2','❌ सही Email डालें!');return;}
  if(pin.length!==4){showErr('lerr2','❌ 4 अंक का पिन!');return;}
  // Pre-fill step 3
  document.getElementById('regNameFinal').value=name;
  document.getElementById('mainStep').style.display='none';
  document.getElementById('step3').classList.add('show');
}
function goBack(){
  document.getElementById('mainStep').style.display='block';
  document.getElementById('step3').classList.remove('show');
}
</script>
</body>
</html>
